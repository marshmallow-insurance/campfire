name: 'Setup Node Project'
description: 'Common setup steps: checkout, setup node, and install dependencies'

inputs:
  registry-url:
    description: 'NPM registry URL (optional)'
    required: false
  font-awesome-token:
    description: 'Font Awesome NPM token for private registry (@awesome.me / @fortawesome)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        cache: 'npm'
        package-manager-cache: true
        node-version-file: '.nvmrc'
        registry-url: ${{ inputs.registry-url }}

    - name: Install Dependencies
      shell: bash
      env:
        FONT_AWESOME_NPM_TOKEN: ${{ inputs.font-awesome-token }}
      run: |
        npm ci --ignore-scripts

